<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Oasis Strata</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<style>
html { scroll-behavior: smooth; }

body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  background:
    radial-gradient(circle at top, rgba(24, 48, 63, 0.35), transparent 45%),
    linear-gradient(180deg, #09141c 0%, #0b1720 40%, #0f1a22 100%);
  color: #E8ECEF;
}

/* HEADER */
.header {
  position: sticky;
  top: 0;
  background: rgba(9, 20, 28, 0.9);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid rgba(229, 203, 137, 0.14);
  z-index: 100;
}

.nav {
  max-width: 1500px;
  margin: auto;
  padding: 4px 20px; /* slim */
  display: flex;
  justify-content: space-between;
  align-items: center;
}

/* BIG LOGO LEFT */
.brand img {
  width: 200px;
  height: 200px;
  object-fit: contain;
}

/* TABS */
.tabs {
  display: flex;
  gap: 6px;
  align-items: center;
}

/* SMALL BUTTONS */
.tab {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;

  width: 70px;
  height: 60px;

  padding: 4px;
  border-radius: 10px;

  color: #A8B3BA;
  text-decoration: none;
  font-size: 0.7rem;

  transition: 0.2s ease;
  position: relative;
}

/* BIG ICONS */
.tab img {
  width: 140px;
  height: 140px;
  object-fit: contain;

  position: absolute;
  top: -40px;
}

.tab span {
  margin-top: 60px;
}

/* STATES */
.tab:hover {
  color: white;
  background: rgba(27, 43, 54, 0.7);
}

.tab.active {
  color: white;
  background: rgba(46, 76, 73, 0.7);
  box-shadow: 0 0 12px rgba(143,179,122,0.2);
}

/* HERO */
.hero {
  width: 100%;
  height: 460px;
  overflow: hidden;
  background: #0F1A22;
}

.hero img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* MAIN */
.container {
  max-width: 1100px;
  margin: auto;
  padding: 100px 20px;
  text-align: center;
}

.logo {
  width: 520px;
  max-width: 90%;
}

h1 {
  font-size: 4rem;
}

.strata {
  color: #D87C3F;
  letter-spacing: 8px;
}

.button {
  margin-top: 30px;
  padding: 16px 32px;
  background: #D87C3F;
  border: none;
  border-radius: 8px;
  color: white;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 30px;
  margin-top: 60px;
}

.card {
  background: #16232D;
  padding: 50px 20px;
  border-radius: 18px;
}

.card img {
  width: 180px;
}

.footer {
  margin-top: 120px;
  color: #6C7A82;
}

/* RESPONSIVE */
@media (max-width: 1000px) {
  .nav {
    flex-direction: column;
  }

  .tabs {
    flex-wrap: wrap;
    justify-content: center;
  }
}

@media (max-width: 700px) {
  .tab img {
    width: 90px;
    height: 90px;
    top: -20px;
  }

  .brand img {
    width: 140px;
    height: 140px;
  }

  .grid {
    grid-template-columns: 1fr;
  }
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <div class="nav">

    <!-- BIG LOGO -->
    <div class="brand">
      <img src="./assets/logo.png">
    </div>

    <!-- TABS -->
    <div class="tabs">
      <a class="tab active" href="#">
        <img src="./assets/sculpt.png">
        <span>Sculpt</span>
      </a>

      <a class="tab" href="#">
        <img src="./assets/paint.png">
        <span>Paint</span>
      </a>

      <a class="tab" href="#">
        <img src="./assets/biomes.png">
        <span>Biomes</span>
      </a>

      <a class="tab" href="#">
        <img src="./assets/settings.png">
        <span>Settings</span>
      </a>
    </div>

  </div>
</div>

<!-- HERO -->
<div class="hero">
  <img src="./assets/hero.png">
</div>

<!-- MAIN -->
<div class="container">

  <img src="./assets/logo.png" class="logo">

  <h1>OASIS</h1>
  <div class="strata">STRATA</div>

  <h2>Build worlds with high-performance voxel terrain</h2>

  <button class="button">Coming Soon</button>

  <div class="grid">
    <div class="card">
      <img src="./assets/sculpt.png">
      <h3>Sculpt</h3>
    </div>

    <div class="card">
      <img src="./assets/paint.png">
      <h3>Paint</h3>
    </div>

    <div class="card">
      <img src="./assets/biomes.png">
      <h3>Biomes</h3>
    </div>

    <div class="card">
      <img src="./assets/settings.png">
      <h3>Settings</h3>
    </div>
  </div>

  <div class="footer">
    © Oasis Strata — In Development
  </div>

</div>

</body>
</html>
