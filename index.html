<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Oasis Strata</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<style>
html { scroll-behavior: smooth; }

body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  background:
    radial-gradient(circle at top, rgba(24, 48, 63, 0.35), transparent 45%),
    linear-gradient(180deg, #09141c 0%, #0b1720 40%, #0f1a22 100%);
  color: #E8ECEF;
}

/* HEADER */
.header {
  position: sticky;
  top: 0;
  background: rgba(9, 20, 28, 0.9);
  backdrop-filter: blur(14px);
  border-bottom: 1px solid rgba(229, 203, 137, 0.14);
  z-index: 100;
}

.nav {
  max-width: 1800px;
  margin: auto;
  padding: 50px 40px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
}

/* BRAND */
.brand {
  display: flex;
  align-items: center;
  gap: 20px;
}

.brand img {
  width: 180px;
  height: 180px;
}

.brand span {
  font-weight: 700;
  letter-spacing: 4px;
  font-size: 1.4rem;
}

/* TABS */
.tabs {
  display: flex;
  gap: 14px;
  flex-wrap: wrap;
  justify-content: flex-end;
}

.tab {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 12px;
  color: #A8B3BA;
  text-decoration: none;
  font-size: 1.2rem;
  padding: 18px;
  border-radius: 20px;
  transition: 0.2s;
}

.tab img {
  width: 200px;
  height: 200px;
  object-fit: contain;
}

.tab:hover {
  color: white;
  background: rgba(27, 43, 54, 0.7);
}

.tab:hover img {
  transform: scale(1.05);
}

.tab.active {
  color: white;
  background: rgba(46, 76, 73, 0.7);
  box-shadow: 0 0 20px rgba(143,179,122,0.15);
}

/* HERO */
.hero {
  width: 100%;
  height: 500px;
  overflow: hidden;
}

.hero img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* MAIN */
.container {
  max-width: 1100px;
  margin: auto;
  padding: 100px 20px;
  text-align: center;
}

.logo {
  width: 600px;
  max-width: 95%;
}

h1 {
  font-size: 4rem;
  letter-spacing: 4px;
}

.strata {
  color: #D87C3F;
  letter-spacing: 8px;
}

h2 {
  color: #8FB37A;
}

.button {
  margin-top: 30px;
  padding: 16px 32px;
  background: #D87C3F;
  border: none;
  border-radius: 8px;
  color: white;
  cursor: pointer;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 30px;
  margin-top: 60px;
}

.card {
  background: #16232D;
  padding: 50px 20px;
  border-radius: 18px;
}

.card img {
  width: 180px;
}

.footer {
  margin-top: 120px;
  color: #6C7A82;
}
</style>
</head>

<body>

<div class="header">
  <div class="nav">

    <div class="brand">
      <img src="./assets/logo.png">
      <span>OASIS</span>
    </div>

    <div class="tabs">
      <a class="tab active" href="#sculpt">
        <img src="./assets/sculpt.png">
        <span>Sculpt</span>
      </a>

      <a class="tab" href="#paint">
        <img src="./assets/paint.png">
        <span>Paint</span>
      </a>

      <a class="tab" href="#biomes">
        <img src="./assets/biomes.png">
        <span>Biomes</span>
      </a>

      <a class="tab" href="#settings">
        <img src="./assets/settings.png">
        <span>Settings</span>
      </a>
    </div>

  </div>
</div>

<div class="hero">
  <img src="./assets/hero.png">
</div>

<div class="container">

  <img src="./assets/logo.png" class="logo">

  <h1>OASIS</h1>
  <div class="strata">STRATA</div>

  <h2>Build worlds with high-performance voxel terrain</h2>

  <button class="button">Coming Soon</button>

  <div class="grid">
    <div class="card">
      <img src="./assets/sculpt.png">
      <h3>Sculpt</h3>
    </div>

    <div class="card">
      <img src="./assets/paint.png">
      <h3>Paint</h3>
    </div>

    <div class="card">
      <img src="./assets/biomes.png">
      <h3>Biomes</h3>
    </div>

    <div class="card">
      <img src="./assets/settings.png">
      <h3>Settings</h3>
    </div>
  </div>

  <div class="footer">
    © Oasis Strata — In Development
  </div>

</div>

</body>
</html>
