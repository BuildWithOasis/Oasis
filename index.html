<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Oasis Strata</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<style>
html { scroll-behavior: smooth; }

body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  background:
    radial-gradient(circle at top, rgba(24, 48, 63, 0.35), transparent 45%),
    linear-gradient(180deg, #09141c 0%, #0b1720 40%, #0f1a22 100%);
  color: #E8ECEF;
}

/* HEADER */
.header {
  position: sticky;
  top: 0;
  background: rgba(9, 20, 28, 0.9);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid rgba(229, 203, 137, 0.14);
  z-index: 100;
}

.nav {
  max-width: 1500px;
  margin: auto;
  padding: 4px 20px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

/* BIG LOGO LEFT */
.brand img {
  width: 200px;
  height: 200px;
  object-fit: contain;
}

/* TABS */
.tabs {
  display: flex;
  gap: 6px;
  align-items: center;
}

/* SMALL BUTTONS */
.tab {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  width: 70px;
  height: 60px;
  padding: 4px;
  border-radius: 10px;
  color: #A8B3BA;
  text-decoration: none;
  font-size: 0.7rem;
  transition: 0.2s ease;
  position: relative;
}

/* BIG ICONS */
.tab img {
  width: 140px;
  height: 140px;
  object-fit: contain;
  position: absolute;
  top: -40px;
}

.tab span {
  margin-top: 60px;
}

/* STATES */
.tab:hover {
  color: white;
  background: rgba(27, 43, 54, 0.7);
}

.tab.active {
  color: white;
  background: rgba(46, 76, 73, 0.7);
  box-shadow: 0 0 12px rgba(143,179,122,0.2);
}

/* HERO */
.hero {
  width: 100%;
  height: 460px;
  position: relative;
  overflow: hidden;
  background: #0F1A22;
}

.hero img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}

.hero::after {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(
    to bottom,
    rgba(15,26,34,0) 0%,
    rgba(15,26,34,0.3) 50%,
    #0F1A22 100%
  );
  pointer-events: none;
}

/* MAIN */
.container {
  max-width: 1100px;
  margin: auto;
  padding: 100px 20px;
  text-align: center;
}

.logo {
  width: 520px;
  max-width: 90%;
}

h1 {
  font-size: 4rem;
  margin-bottom: 8px;
}

.strata {
  color: #D87C3F;
  letter-spacing: 8px;
  margin-bottom: 20px;
}

h2 {
  color: #8FB37A;
  font-weight: 500;
}

.button {
  margin-top: 30px;
  padding: 16px 32px 12px;
  background: #D87C3F;
  border: none;
  border-radius: 8px;
  color: white;
  font-size: 1rem;
  font-weight: 600;
  cursor: pointer;
  display: inline-flex;
  align-items: flex-start;
  justify-content: center;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 30px;
  margin-top: 60px;
}

.card {
  background: #16232D;
  padding: 50px 20px;
  border-radius: 18px;
}

.card img {
  width: 180px;
}

.footer {
  margin-top: 120px;
  color: #6C7A82;
}

/* RESPONSIVE */
@media (max-width: 1000px) {
  .nav {
    flex-direction: column;
  }

  .tabs {
    flex-wrap: wrap;
    justify-content: center;
  }
}

@media (max-width: 700px) {
  .tab img {
    width: 90px;
    height: 90px;
    top: -20px;
  }

  .brand img {
    width: 140px;
    height: 140px;
  }

  .grid {
    grid-template-columns: 1fr;
  }

  .hero {
    height: 320px;
  }
}
</style>
</head>

<body>

<div class="header">
  <div class="nav">

    <div class="brand">
      <img src="./assets/logo.png" alt="Oasis Strata logo">
    </div>

    <div class="tabs">
      <a class="tab active" href="#">
        <img src="./assets/sculpt.png" alt="">
        <span>Sculpt</span>
      </a>

      <a class="tab" href="#">
        <img src="./assets/paint.png" alt="">
        <span>Paint</span>
      </a>

      <a class="tab" href="#">
        <img src="./assets/biomes.png" alt="">
        <span>Biomes</span>
      </a>

      <a class="tab" href="#">
        <img src="./assets/settings.png" alt="">
        <span>Settings</span>
      </a>
    </div>

  </div>
</div>

<div class="hero">
  <img src="./assets/hero.png" alt="Oasis Strata terrain preview">
</div>

<div class="container">

  <img src="./assets/logo.png" class="logo" alt="Oasis Strata logo">

  <h1>OASIS</h1>
  <div class="strata">STRATA</div>

  <h2>Build worlds with high-performance voxel terrain</h2>

  <button class="button">Coming Soon</button>

  <div class="grid">
    <div class="card">
      <img src="./assets/sculpt.png" alt="">
      <h3>Sculpt</h3>
    </div>

    <div class="card">
      <img src="./assets/paint.png" alt="">
      <h3>Paint</h3>
    </div>

    <div class="card">
      <img src="./assets/biomes.png" alt="">
      <h3>Biomes</h3>
    </div>

    <div class="card">
      <img src="./assets/settings.png" alt="">
      <h3>Settings</h3>
    </div>
  </div>

  <div class="footer">
    © Oasis Strata — In Development
  </div>

</div>

</body>
</html>
