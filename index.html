<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Oasis Strata</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<style>
html {
  scroll-behavior: smooth;
}

body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  background:
    radial-gradient(circle at top, rgba(24, 48, 63, 0.35), transparent 45%),
    linear-gradient(180deg, #09141c 0%, #0b1720 40%, #0f1a22 100%);
  color: #E8ECEF;
}

/* HEADER */
.header {
  position: sticky;
  top: 0;
  background: rgba(9, 20, 28, 0.88);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid rgba(229, 203, 137, 0.14);
  z-index: 100;
}

.nav {
  max-width: 1500px;
  margin: auto;
  padding: 14px 24px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 24px;
}

.brand {
  display: flex;
  align-items: center;
  gap: 14px;
  flex-shrink: 0;
}

.brand img {
  width: 78px;
  height: 78px;
  object-fit: contain;
}

.brand span {
  font-weight: 700;
  letter-spacing: 3px;
  font-size: 1.15rem;
}

/* TABS */
.tabs {
  display: flex;
  gap: 8px;
  align-items: center;
  flex-wrap: nowrap;
}

.tab {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  width: 96px;
  min-width: 96px;
  padding: 8px 8px 10px;
  border-radius: 12px;
  color: #A8B3BA;
  text-decoration: none;
  transition: 0.2s ease;
  background: transparent;
  text-align: center;
}

.tab img {
  width: 128px;
  height: 128px;
  object-fit: contain;
  margin-bottom: -14px;
  opacity: 0.98;
  transition: 0.2s ease;
  filter: drop-shadow(0 0 10px rgba(216,124,63,0.08));
}

.tab span {
  font-size: 0.8rem;
  line-height: 1.1;
}

.tab:hover {
  color: white;
  background: rgba(27, 43, 54, 0.75);
}

.tab:hover img {
  transform: scale(1.04);
}

.tab.active {
  color: white;
  background: linear-gradient(180deg, rgba(46, 76, 73, 0.72), rgba(24, 42, 52, 0.92));
  box-shadow:
    inset 0 1px 0 rgba(229, 203, 137, 0.10),
    0 0 0 1px rgba(143, 179, 122, 0.14),
    0 0 18px rgba(143, 179, 122, 0.12);
}

/* HERO */
.hero {
  width: 100%;
  height: 460px;
  position: relative;
  overflow: hidden;
  border-bottom: 1px solid rgba(229, 203, 137, 0.08);
  background: #0F1A22;
}

.hero img {
  display: block;
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: center;
  opacity: 0.78;
}

.hero::before {
  content: "";
  position: absolute;
  inset: 0;
  background:
    linear-gradient(to bottom, rgba(5, 10, 14, 0.08), rgba(5, 10, 14, 0.22)),
    radial-gradient(circle at center, transparent 20%, rgba(9,20,28,0.25) 85%);
}

.hero::after {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(to bottom, rgba(15,26,34,0.02), #0F1A22 92%);
}

/* MAIN */
.container {
  max-width: 1100px;
  margin: auto;
  padding: 86px 24px 110px;
  text-align: center;
}

.logo {
  width: 520px;
  max-width: 92%;
  margin-bottom: 28px;
  filter: drop-shadow(0 0 18px rgba(216,124,63,0.10));
}

h1 {
  font-size: 4rem;
  margin: 0;
  letter-spacing: 4px;
  font-weight: 800;
}

.strata {
  color: #D87C3F;
  letter-spacing: 9px;
  margin: 10px 0 28px;
  font-size: 1.08rem;
}

h2 {
  color: #8FB37A;
  font-weight: 500;
  font-size: 2rem;
  margin-bottom: 18px;
}

p {
  color: #C8D2D8;
  line-height: 1.7;
  font-size: 1.1rem;
  margin: 0;
}

.hero-copy {
  max-width: 720px;
  margin: 0 auto;
}

.button {
  margin-top: 38px;
  padding: 15px 34px;
  background: linear-gradient(180deg, #e0904f, #d87c3f);
  border: none;
  border-radius: 10px;
  color: white;
  cursor: pointer;
  transition: 0.2s ease;
  font-size: 1rem;
  font-weight: 600;
  box-shadow: 0 10px 25px rgba(216,124,63,0.15);
}

.button:hover {
  transform: translateY(-2px);
  box-shadow: 0 14px 32px rgba(216,124,63,0.22);
}

/* SECTIONS */
.section {
  margin-top: 120px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(4, minmax(0, 1fr));
  gap: 24px;
  margin-top: 48px;
}

.card {
  background:
    linear-gradient(180deg, rgba(27, 43, 54, 0.92), rgba(18, 31, 40, 0.98));
  border: 1px solid rgba(143, 179, 122, 0.08);
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,0.02),
    0 12px 30px rgba(0,0,0,0.22);
  padding: 52px 25px 42px;
  border-radius: 18px;
  text-align: center;
}

.card img {
  width: 160px;
  height: 160px;
  object-fit: contain;
}

.footer {
  margin-top: 130px;
  color: #6C7A82;
  font-size: 0.95rem;
}

/* RESPONSIVE */
@media (max-width: 1200px) {
  .nav {
    flex-direction: column;
    align-items: center;
  }

  .tabs {
    flex-wrap: wrap;
    justify-content: center;
  }
}

@media (max-width: 980px) {
  .grid {
    grid-template-columns: repeat(2, minmax(0, 1fr));
  }

  .brand img {
    width: 64px;
    height: 64px;
  }

  .tab {
    width: 84px;
    min-width: 84px;
    padding: 8px 6px 8px;
  }

  .tab img {
    width: 92px;
    height: 92px;
    margin-bottom: -10px;
  }

  .tab span {
    font-size: 0.74rem;
  }
}

@media (max-width: 640px) {
  .hero {
    height: 300px;
  }

  .logo {
    width: 320px;
  }

  h1 {
    font-size: 2.8rem;
  }

  .grid {
    grid-template-columns: 1fr;
  }

  .tabs {
    gap: 6px;
  }

  .tab {
    width: 74px;
    min-width: 74px;
    padding: 6px 4px 8px;
  }

  .tab img {
    width: 72px;
    height: 72px;
    margin-bottom: -6px;
  }

  .tab span {
    font-size: 0.68rem;
  }
}
</style>
</head>

<body>

<div class="header">
  <div class="nav">
    <div class="brand">
      <img src="./assets/logo.png" alt="Oasis Strata logo">
      <span>OASIS</span>
    </div>

    <div class="tabs">
      <a class="tab active" href="#sculpt">
        <img src="./assets/sculpt.png" alt="">
        <span>Sculpt</span>
      </a>

      <a class="tab" href="#paint">
        <img src="./assets/paint.png" alt="">
        <span>Paint</span>
      </a>

      <a class="tab" href="#biomes">
        <img src="./assets/biomes.png" alt="">
        <span>Biomes</span>
      </a>

      <a class="tab" href="#settings">
        <img src="./assets/settings.png" alt="">
        <span>Settings</span>
      </a>
    </div>
  </div>
</div>

<div class="hero">
  <img src="./assets/hero.png" alt="Oasis Strata terrain preview">
</div>

<div class="container">
  <img src="./assets/logo.png" class="logo" alt="Oasis Strata logo">

  <h1>OASIS</h1>
  <div class="strata">STRATA</div>

  <div class="hero-copy">
    <h2>Build worlds with high-performance voxel terrain</h2>
    <p>
      A scalable terrain system for Unity.<br>
      Designed for stylized and realistic large worlds.
    </p>
  </div>

  <button class="button">Coming Soon</button>

  <div class="section">
    <h2>Core Tools</h2>

    <div class="grid">
      <div class="card">
        <img src="./assets/sculpt.png" alt="">
        <h3>Sculpt</h3>
      </div>

      <div class="card">
        <img src="./assets/paint.png" alt="">
        <h3>Paint</h3>
      </div>

      <div class="card">
        <img src="./assets/biomes.png" alt="">
        <h3>Biomes</h3>
      </div>

      <div class="card">
        <img src="./assets/settings.png" alt="">
        <h3>Settings</h3>
      </div>
    </div>
  </div>

  <div class="footer">
    © Oasis Strata — In Development
  </div>
</div>

</body>
</html>
